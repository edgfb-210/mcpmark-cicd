name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            const labels = issue.labels.map(l => l.name);

            // Add needs-triage label if not present
            if (!labels.includes('needs-triage')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-triage']
              });
            }

            // Assign category labels based on title
            const categoryLabels = [];
            if (title.includes('bug')) {
              categoryLabels.push('bug');
            }
            if (title.includes('epic')) {
              categoryLabels.push('epic');
            }
            if (title.includes('maintenance')) {
              categoryLabels.push('maintenance');
            }

            // Add category labels if not already present
            for (const label of categoryLabels) {
              if (!labels.includes(label)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [label]
                });
              }
            }

            // Assign priority labels
            const priorityKeywords = {
              'priority-critical': ['critical', 'urgent', 'production', 'outage'],
              'priority-high': ['important', 'high', 'blocking'],
              'priority-medium': ['medium', 'normal'],
              'priority-low': ['low', 'nice-to-have', 'minor']
            };

            let assignedPriority = 'priority-medium'; // default

            // Check for highest priority first
            for (const [priority, keywords] of Object.entries(priorityKeywords)) {
              for (const keyword of keywords) {
                if (title.includes(keyword) || body.includes(keyword)) {
                  assignedPriority = priority;
                  break;
                }
              }
              if (assignedPriority !== 'priority-medium') {
                break;
              }
            }

            // Add priority label if not already present
            if (!labels.includes(assignedPriority)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [assignedPriority]
              });
            }

  task-breakdown:
    needs: issue-triage
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Create sub-issues for epic
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context;
            const parentNumber = issue.number;
            const parentTitle = issue.title;
            const tasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            const subIssueNumbers = [];

            // Create each sub-issue
            for (let i = 0; i < tasks.length; i++) {
              const task = tasks[i];
              const subTitle = `[SUBTASK] ${parentTitle} - Task ${i+1}: ${task.name}`;
              const subBody = `Related to #${parentNumber}`;

              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });

              subIssueNumbers.push(subIssue.data.number);
            }

            // Update parent issue body with checklist
            const checklist = subIssueNumbers.map(num => `- [ ] #${num}`).join('\n');
            const newBody = issue.body ? `${issue.body}\n\n## Epic Tasks\n${checklist}` : `## Epic Tasks\n${checklist}`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: newBody
            });

  auto-response:
    needs: issue-triage
    runs-on: ubuntu-latest
    steps:
      - name: Check if first-time contributor
        id: check-first-time
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context;
            const author = issue.user.login;

            // Get all issues created by the author in this repo
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all'
            });

            // Check if this is their first issue in the repo
            const isFirstTime = issues.data.length === 1;
            return isFirstTime;

      - name: Add first-time-contributor label and welcome message
        if: steps.check-first-time.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context;

            // Add first-time-contributor label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['first-time-contributor']
            });

            // Post welcome message
            const welcomeMessage = `Welcome to the repository, @${issue.user.login}! 🎉 This is your first issue here. We appreciate your contribution.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: welcomeMessage
            });

      - name: Post response based on issue type
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context;
            const labels = issue.labels.map(l => l.name);
            let response = '';

            if (labels.includes('bug')) {
              response = '### Bug Report Guidelines\n\nPlease ensure you have provided:\n1. Clear steps to reproduce the bug\n2. Expected vs actual behavior\n3. Screenshots (if applicable)\n4. Any additional context about the environment';
            } else if (labels.includes('epic')) {
              response = '### Feature Request Process\n\nThis epic will be broken down into sub-tasks. Please review the generated sub-issues and provide any additional details needed for each task.';
            } else if (labels.includes('maintenance')) {
              response = '### Maintenance Guidelines\n\nPlease provide details about the maintenance task, including:\n1. Scope of the maintenance work\n2. Any dependencies or prerequisites\n3. Expected outcomes';
            }

            if (response) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: response
              });
            }

      - name: Set milestone for high/critical priority
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context;
            const labels = issue.labels.map(l => l.name);

            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              // Get milestone v1.0.0 (assuming it exists; if not, create it? But user didn't mention creating milestones, so just set it if it exists)
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });

              const milestone = milestones.data.find(m => m.title === 'v1.0.0');
              if (milestone) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  milestone: milestone.number
                });
              }
            }

      - name: Update status from needs-triage to needs-review
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context;
            const labels = issue.labels.map(l => l.name);

            // Remove needs-triage label
            if (labels.includes('needs-triage')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'needs-triage'
              });
            }

            // Add needs-review label
            if (!labels.includes('needs-review')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-review']
              });
            }
